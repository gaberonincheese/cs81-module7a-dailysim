  <div id="output" style="margin-top: 40px; font-size: 1.5rem;"> What's on our schedule? </div>

  <script>

    //dayActivities.forEach(event => { outputtedText += event.activity; });

        dayActivities.forEach(event => {setTimeout(outputtedText += '\n' + event.activity, event.delay)});

        //{ setTimeout(() => event.activity, event.delay)}

            dayActivities.forEach(event => {

            output.textContent = outputtedText;
        }, 1000);*/
        return outputtedText;
    }

    output.textContent = printDailySchedule();
