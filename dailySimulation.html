<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Daily Schedule Simulation</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 60px; background-color: #eef;">

  <h1>My Simulated Day</h1>
    <p id="intro" style="margin-top: 40px; font-size: 1.5rem;"> What's on my schedule? </p>
  <div id="output" style="margin-top: 40px; font-size: 1.5rem;"> </div>

    <script>
    const output = document.getElementById("output");
    
    let dayActivities = [
        {time: "morning", activity: "eat breakfast", mood: "satisfied", delay: 3000},
        {time: "morning", activity: "take my medication", mood: "prepared", delay: 3000},
        {time: "afternoon", activity: "take the metro to the cmd campus", mood: "peppy", delay: 4000},
        {time: "afternoon", activity: "do my figure drawing class", mood: "productive", delay: 4000},
        {time: "evening", activity: "cook dinner", mood: "good", delay: 5000},
        {time: "evening", activity: "wind down for the night", mood: "fulfilled", delay: 5000},
    ];

    let potentialChoices = [
        {time: "morning", activity: "do 10 jumping jacks", mood: "energized", delay: 2500},
        {time: "morning", activity: "write down my thoughts for the coming day", mood: "introspective", delay: 2500},
        {time: "morning", activity: "draw a quick sketch", mood: "inspired", delay: 2500},
        {time: "afternoon", activity: "stop by a new place using the expo line", mood: "curious", delay: 3500},
        {time: "afternoon", activity: "pay a stranger a compliment", mood: "kind", delay: 3500},
        {time: "afternoon", activity: "pick up a piece of trash", mood: "considerate", delay: 3500},
        {time: "evening", activity: "work on a fun personal project", mood: "inspired", delay: 4500},
        {time: "evening", activity: "play a new video game", mood: "expanded", delay: 4500},
        {time: "evening", activity: "go on a walk", mood: "energized", delay: 4500},
    ];
    
   let outputtedText;

    function printDailySchedule() {
        dayActivities.forEach(item => setTimeout(function() {
            outputtedText += 'I need to ' + item.activity + ". Time of day: " + item.time + ". My mood will be: " + item.mood + "!"
            output.textContent = outputtedText;
        }, item.delay));

    }

    function sortActivities(newTask) {
        if (newTask.time == "morning") {
            dayActivities.unshift(newTask);
        } else if (newTask.time == "afternoon") {
            dayActivities.splice(3, 0, newTask);
        } else {
            dayActivities.push(newTask);
        }
    }
    
    let randomTask = potentialChoices[Math.floor(Math.random() * potentialChoices.length)];
    sortActivities(randomTask);
    printDailySchedule();       

  </script>

</body>
</html>
