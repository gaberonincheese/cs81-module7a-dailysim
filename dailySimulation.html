<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Daily Schedule Simulation</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 60px; background-color: #eef;">

  <h1>My Simulated Day</h1>
    <p id="intro" style="margin-top: 40px; font-size: 1.5rem;"> What's on my schedule for the day? Let's see! </p>
  <div id="output" style="margin-top: 40px; font-size: 1.5rem;"> </div>

    <script>
    const output = document.getElementById("output");
    
    let dayActivities = [
        {time: "morning", activity: "Eat breakfast", mood: "satisfied"},
        {time: "morning", activity: "Take my medication", mood: "prepared"},
        {time: "afternoon", activity: "Ride the metro to the CMD campus", mood: "peppy"},
        {time: "afternoon", activity: "Do my figure drawing class", mood: "productive"},
        {time: "afternoon", activity: "Take the metro home", mood: "tired"},
        {time: "evening", activity: "Cook dinner", mood: "enriched"},
        {time: "evening", activity: "Wind down for the night", mood: "fulfilled"},
    ];

    let potentialChoices = [
        {time: "morning", activity: "Do 10 jumping jacks", mood: "energized"},
        {time: "morning", activity: "Write down my thoughts for the coming day", mood: "introspective"},
        {time: "morning", activity: "Draw a quick sketch", mood: "inspired"},
        {time: "afternoon", activity: "Stop by a new place using the expo line", mood: "curious"},
        {time: "afternoon", activity: "Pay a stranger a compliment", mood: "kind"},
        {time: "afternoon", activity: "Pick up a piece of trash", mood: "considerate"},
        {time: "evening", activity: "Work on a fun personal project", mood: "inspired"},
        {time: "evening", activity: "Play a new video game", mood: "expanded"},
        {time: "evening", activity: "Go on a walk", mood: "energized"},
    ];
    
   let outputtedText = "";

    function printDailySchedule() {
        dayActivities.forEach(item => setTimeout(function() {
            output.insertAdjacentElement("beforeend", document.createElement("br"));
            outputtedText = item.activity + ". Time of day: " + item.time + ". My mood will be: " + item.mood + "! ";
            output.insertAdjacentText("beforeend", outputtedText);
            output = outputtedText;
        }, item.delay));

    }

    function sortActivities(newTask) {
        if (newTask.time == "morning") {
            dayActivities.unshift(newTask);
        } else if (newTask.time == "afternoon") {
            dayActivities.splice(3, 0, newTask);
        } else {
            dayActivities.splice(dayActivities.length - 1, 0, newTask);
        }
    }

    function addDelay(events) {
        del = 1000;
        events.forEach(item => { item.delay = del; del += 500;});
    }
    
    function chooseRandom() {
        let randomTask;
        let randomNum;
        
        if (potentialChoices.length != 0) {
            randomNum = Math.floor(Math.random() * potentialChoices.length);
            randomTask = potentialChoices[randomNum];
            potentialChoices.splice(randomNum, 1);
        }

        return randomTask;
    }

    sortActivities(chooseRandom());
    sortActivities(chooseRandom());
    addDelay(dayActivities);
    printDailySchedule();       

  </script>

</body>
</html>
